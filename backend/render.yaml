services:
  - type: web
    name: saak-guard-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: saak-guard-db
          property: connectionString
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: AES_KEY_HEX
        sync: false
      - key: TOTP_SECRET
        sync: false
      - key: ALLOWED_DEVICE_IDS
        value: SAAK-001
      - key: ECDSA_PRIVATE_KEY
        sync: false

databases:
  - name: saak-guard-db
    databaseName: saakguard
    user: saakguard
